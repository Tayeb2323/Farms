<!DOCTYPE html>
<html>
<head>
  <title>Mes Fermes</title>
  <!-- Meta viewport pour une adaptation fluide sur tout type d'appareil -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Lien vers le fichier CSS -->
  <link rel="stylesheet" href="main.css">
  
  <!-- Inclusion de Flatpickr -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  
  <!-- Google Maps API (remplacez YOUR_API_KEY par votre clé) -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCeJcVKh1JXD6HGSoG9sI1trhR8mXMZRVM"></script>
  
  <!-- Optionnel : FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <!-- Bandeau utilisateur -->
  <div id="userBar">
    Utilisateur : <strong>Benhammouda</strong>
  </div>
  
  <!-- Bouton d'observation -->
  <button id="toggleObservationBtn" class="observation-btn">
    📍 Ajouter un point d'observation
  </button>
  
  <!-- Boîte d'affichage des coordonnées avec bouton Copier -->
  <div id="coordsBox">
    <div>
      <strong>Coordonnées :</strong>
      <div id="coordinatesDisplay"></div>
    </div>
    <button class="copy-btn" onclick="copyCoordinates()">Copier</button>
  </div>
  
  <!-- Barre du haut avec contrôles pour chaque côté -->
  <div id="topBar">
    <!-- Côté gauche -->
    <select id="fermeSelectLeft"></select>
    <select id="indexSelectLeft"></select>
    <!-- Input date en lecture seule pour forcer l'ouverture du calendrier -->
    <input type="text" id="datePickerLeft" style="display:inline-block;" readonly>
    
    <!-- Checkbox Comparaison -->
    <div id="comparisonContainer">
      <input type="checkbox" id="comparisonCheckbox">
      <label for="comparisonCheckbox">Comparaison</label>
    </div>
    
    <!-- Côté droit (affiché en mode comparaison) -->
    <select id="fermeSelectRight" style="display:none;"></select>
    <select id="indexSelectRight" style="display:none;"></select>
    <input type="text" id="datePickerRight" style="display:none;" readonly>
  </div>
  
  <!-- Conteneur des cartes -->
  <div id="mapContainer">
    <div id="leftMap"></div>
    <div id="rightMap"></div>
  </div>
  
  <!-- Inclusion du fichier JavaScript -->
  <script src="main.js"></script>
</body>
</html>
